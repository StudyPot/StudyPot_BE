openapi: 3.1.0
info:
  title: AI Study Leader API
  version: 1.0.0
  description: Locked v1 REST contract for the AI Study Leader backend.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Groups
  - name: Members
  - name: Invitations
  - name: Sessions
  - name: Notes
  - name: ActionItems
  - name: Goals
  - name: Resources
  - name: AI
  - name: Discord
paths:
  /auth/oauth/google/authorize:
    get:
      tags: [Auth]
      summary: Start Google OAuth login
      security: []
      responses:
        '200':
          description: OAuth authorization URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthAuthorizeResponse'
  /auth/oauth/google/callback:
    post:
      tags: [Auth]
      summary: Complete Google OAuth login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthCallbackRequest'
      responses:
        '200':
          description: Authenticated session result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
  /users/me:
    get:
      tags: [Users]
      summary: Read current user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /users/me/discord-link:
    post:
      tags: [Users]
      summary: Link Discord account to current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscordLinkRequest'
      responses:
        '200':
          description: Linked Discord account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordAccount'
    delete:
      tags: [Users]
      summary: Unlink current user's primary Discord account
      responses:
        '204':
          description: Discord account unlinked
  /groups:
    get:
      tags: [Groups]
      summary: List groups for current user
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Group page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGroupPage'
    post:
      tags: [Groups]
      summary: Create study group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudyGroupRequest'
      responses:
        '201':
          description: Created group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGroup'
  /groups/{groupId}:
    get:
      tags: [Groups]
      summary: Read study group
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: Study group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGroup'
    patch:
      tags: [Groups]
      summary: Update mutable study group fields
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudyGroupRequest'
      responses:
        '200':
          description: Updated group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGroup'
    delete:
      tags: [Groups]
      summary: Archive study group
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '204':
          description: Group archived
  /groups/{groupId}/members:
    get:
      tags: [Members]
      summary: List group members
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Member page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberPage'
  /groups/{groupId}/members/{memberId}:
    patch:
      tags: [Members]
      summary: Update group member role or status
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRequest'
      responses:
        '200':
          description: Updated member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGroupMember'
  /groups/{groupId}/invitations:
    get:
      tags: [Invitations]
      summary: List group invitations
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Invitation page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationPage'
    post:
      tags: [Invitations]
      summary: Create group invitation
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
      responses:
        '201':
          description: Created invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGroupInvitation'
  /invitations/{invitationId}/accept:
    post:
      tags: [Invitations]
      summary: Accept invitation
      parameters:
        - $ref: '#/components/parameters/InvitationId'
      responses:
        '200':
          description: Created or restored membership
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGroupMember'
  /groups/{groupId}/sessions:
    get:
      tags: [Sessions]
      summary: List group sessions
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Session page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionPage'
    post:
      tags: [Sessions]
      summary: Create study session
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Created session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudySession'
  /sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: Read study session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Study session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudySession'
    patch:
      tags: [Sessions]
      summary: Update study session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSessionRequest'
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudySession'
  /sessions/{sessionId}/attendance:
    get:
      tags: [Sessions]
      summary: List session attendance
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Attendance list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionAttendance'
  /sessions/{sessionId}/attendance/{memberId}:
    put:
      tags: [Sessions]
      summary: Upsert attendance
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertAttendanceRequest'
      responses:
        '200':
          description: Upserted attendance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionAttendance'
  /sessions/{sessionId}/notes:
    get:
      tags: [Notes]
      summary: List session notes
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Note page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotePage'
    post:
      tags: [Notes]
      summary: Submit session note
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Created note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionNote'
  /sessions/{sessionId}/action-items:
    get:
      tags: [ActionItems]
      summary: List session action items
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Action item page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionItemPage'
    post:
      tags: [ActionItems]
      summary: Create action item
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActionItemRequest'
      responses:
        '201':
          description: Created action item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionItem'
  /action-items/{actionItemId}:
    patch:
      tags: [ActionItems]
      summary: Update action item
      parameters:
        - $ref: '#/components/parameters/ActionItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateActionItemRequest'
      responses:
        '200':
          description: Updated action item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionItem'
  /groups/{groupId}/goals:
    get:
      tags: [Goals]
      summary: List goals
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Goal page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalPage'
    post:
      tags: [Goals]
      summary: Create goal
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGoalRequest'
      responses:
        '201':
          description: Created goal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGoal'
  /goals/{goalId}:
    patch:
      tags: [Goals]
      summary: Update goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGoalRequest'
      responses:
        '200':
          description: Updated goal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGoal'
  /groups/{groupId}/resources:
    get:
      tags: [Resources]
      summary: List resources
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Resource page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourcePage'
    post:
      tags: [Resources]
      summary: Create resource
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResourceRequest'
      responses:
        '201':
          description: Created resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyResource'
  /sessions/{sessionId}/ai/preparation-briefs:
    get:
      tags: [AI]
      summary: List AI preparation briefs
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Preparation brief list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AiPreparationBrief'
    post:
      tags: [AI]
      summary: Generate AI preparation brief
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '201':
          description: Generated preparation brief
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiPreparationBrief'
  /sessions/{sessionId}/ai/feedback-reports:
    get:
      tags: [AI]
      summary: List AI feedback reports visible to current user
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Feedback report list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AiFeedbackReport'
    post:
      tags: [AI]
      summary: Generate AI feedback report
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFeedbackReportRequest'
      responses:
        '201':
          description: Generated feedback report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiFeedbackReport'
  /groups/{groupId}/discord/channels:
    get:
      tags: [Discord]
      summary: List Discord notification channels
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: Discord channel list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiscordNotificationChannel'
    post:
      tags: [Discord]
      summary: Connect Discord notification channel
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDiscordChannelRequest'
      responses:
        '201':
          description: Connected Discord channel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordNotificationChannel'
  /discord/channels/{channelId}:
    patch:
      tags: [Discord]
      summary: Update Discord notification channel
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDiscordChannelRequest'
      responses:
        '200':
          description: Updated Discord channel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordNotificationChannel'
    delete:
      tags: [Discord]
      summary: Disable Discord notification channel
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '204':
          description: Discord channel disabled
  /groups/{groupId}/discord/notification-logs:
    get:
      tags: [Discord]
      summary: List Discord notification logs
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Notification log page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationLogPage'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvitationId:
      name: invitationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ActionItemId:
      name: actionItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GoalId:
      name: goalId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChannelId:
      name: channelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ProblemDetail:
      type: object
      required: [type, title, status, detail, instance]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
        fieldErrors:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string
    PageInfo:
      type: object
      required: [hasNext]
      properties:
        nextCursor:
          type: string
        hasNext:
          type: boolean
    OAuthAuthorizeResponse:
      type: object
      required: [authorizationUrl, state]
      properties:
        authorizationUrl:
          type: string
          format: uri
        state:
          type: string
    OAuthCallbackRequest:
      type: object
      required: [code, state]
      properties:
        code:
          type: string
        state:
          type: string
    AuthSessionResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      required: [id, displayName, timezone, status]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
        timezone:
          type: string
        status:
          type: string
          enum: [active, inactive, blocked]
        discordAccount:
          $ref: '#/components/schemas/DiscordAccount'
    DiscordAccount:
      type: object
      required: [id, discordUserId, isPrimary]
      properties:
        id:
          type: string
          format: uuid
        discordUserId:
          type: string
        username:
          type: string
        globalName:
          type: string
        isPrimary:
          type: boolean
    DiscordLinkRequest:
      type: object
      required: [discordAuthorizationCode]
      properties:
        discordAuthorizationCode:
          type: string
    StudyGroup:
      type: object
      required: [id, name, slug, timezone, visibility, status, rules, scheduleDefaults]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        timezone:
          type: string
        visibility:
          type: string
          enum: [private, invite_only, public]
        status:
          type: string
          enum: [active, paused, archived]
        rules:
          type: object
          additionalProperties: true
        scheduleDefaults:
          type: object
          additionalProperties: true
    CreateStudyGroupRequest:
      type: object
      required: [name, slug, timezone, rules, scheduleDefaults]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        timezone:
          type: string
        rules:
          type: object
          additionalProperties: true
        scheduleDefaults:
          type: object
          additionalProperties: true
    UpdateStudyGroupRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        timezone:
          type: string
        visibility:
          type: string
          enum: [private, invite_only, public]
        status:
          type: string
          enum: [active, paused, archived]
        rules:
          type: object
          additionalProperties: true
        scheduleDefaults:
          type: object
          additionalProperties: true
    StudyGroupMember:
      type: object
      required: [id, groupId, userId, role, status]
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, manager, member]
        status:
          type: string
          enum: [active, paused, left, removed]
        preferences:
          type: object
          additionalProperties: true
    UpdateMemberRequest:
      type: object
      properties:
        role:
          type: string
          enum: [owner, manager, member]
        status:
          type: string
          enum: [active, paused, left, removed]
    StudyGroupInvitation:
      type: object
      required: [id, groupId, role, status, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        inviteeEmail:
          type: string
          format: email
        inviteeDiscordUserId:
          type: string
        role:
          type: string
          enum: [manager, member]
        status:
          type: string
          enum: [pending, accepted, expired, revoked]
        expiresAt:
          type: string
          format: date-time
    CreateInvitationRequest:
      type: object
      required: [role, expiresAt]
      properties:
        inviteeEmail:
          type: string
          format: email
        inviteeDiscordUserId:
          type: string
        role:
          type: string
          enum: [manager, member]
        expiresAt:
          type: string
          format: date-time
    StudySession:
      type: object
      required: [id, groupId, sequenceNo, title, status, scheduledStartAt, scheduledEndAt, agenda]
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        sequenceNo:
          type: integer
        title:
          type: string
        status:
          type: string
          enum: [scheduled, ready, in_progress, completed, cancelled]
        scheduledStartAt:
          type: string
          format: date-time
        scheduledEndAt:
          type: string
          format: date-time
        actualStartAt:
          type: string
          format: date-time
        actualEndAt:
          type: string
          format: date-time
        agenda:
          type: object
          additionalProperties: true
    CreateSessionRequest:
      type: object
      required: [title, scheduledStartAt, scheduledEndAt]
      properties:
        title:
          type: string
        scheduledStartAt:
          type: string
          format: date-time
        scheduledEndAt:
          type: string
          format: date-time
        agenda:
          type: object
          additionalProperties: true
    UpdateSessionRequest:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
          enum: [scheduled, ready, in_progress, completed, cancelled]
        scheduledStartAt:
          type: string
          format: date-time
        scheduledEndAt:
          type: string
          format: date-time
        agenda:
          type: object
          additionalProperties: true
    SessionAttendance:
      type: object
      required: [id, sessionId, memberId, status]
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        memberId:
          type: string
          format: uuid
        status:
          type: string
          enum: [unknown, attending, late, absent, excused]
        note:
          type: string
    UpsertAttendanceRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [unknown, attending, late, absent, excused]
        note:
          type: string
    SessionNote:
      type: object
      required: [id, sessionId, noteType, structuredPayload, submittedAt]
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
