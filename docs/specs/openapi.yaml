openapi: 3.1.0
info:
  title: AI Study Leader API
  version: 1.0.0
  description: Locked v1 REST contract for the onboarding-based AI Study Leader backend with in-app notification. OAuth cookie login changes are approved by CR-20260508-oauth2-cookie-login and ADR-20260508-oauth2-cookie-login.
  x-change-control:
    status: LOCKED_FOR_IMPLEMENTATION
    approvedChanges:
      - CR-20260508-oauth2-cookie-login
      - ADR-20260508-oauth2-cookie-login
servers:
  - url: /api/v1
security:
  - bearerAuth: []
  - cookieAccessToken: []
paths:
  /api/oauth2/authorization/google:
    get:
      servers:
        - url: /
      tags: [Auth]
      operationId: startGoogleOAuthLogin
      security: []
      responses:
        '302':
          description: Redirects the browser to Google OAuth. PKCE verifier state is persisted server-side, keyed by oauth_state, and is not sent to the browser.
          headers:
            Location:
              schema: {type: string, format: uri}
            Set-Cookie:
              schema: {type: string}
              description: Optional short-lived HttpOnly OAuth state correlation cookie. PKCE verifier state stays server-side.
  /api/login/oauth2/code/google:
    get:
      servers:
        - url: /
      tags: [Auth]
      operationId: completeGoogleOAuthLogin
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema: {type: string}
        - name: state
          in: query
          required: false
          schema: {type: string}
        - name: error
          in: query
          required: false
          schema: {type: string}
      responses:
        '302':
          description: Redirects to frontend success or failure URI; success sets HttpOnly token cookies, clears OAuth state, and never returns tokens in the URL
          headers:
            Location:
              schema: {type: string, format: uri}
            Set-Cookie:
              schema: {type: string}
              description: HttpOnly `studypot_access_token` and `studypot_refresh_token` cookies on success and cleared temporary OAuth state cookies when present.
  /auth/oauth/google:
    post:
      tags: [Auth]
      operationId: loginWithGoogleOAuth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleOAuthLoginRequest'
      responses:
        '200':
          description: Application tokens issued from a Google authorization code; also sets HttpOnly token cookies
          headers:
            Set-Cookie:
              schema: {type: string}
              description: HttpOnly `studypot_access_token` and `studypot_refresh_token` cookies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshAuthToken
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Refreshed application tokens; also sets rotated HttpOnly token cookies
          headers:
            Set-Cookie:
              schema: {type: string}
              description: Rotated HttpOnly `studypot_access_token` and `studypot_refresh_token` cookies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutCurrentSession
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Current refresh token revoked and token cookies cleared when present
  /auth/logout-all:
    post:
      tags: [Auth]
      operationId: logoutAllSessions
      responses:
        '204':
          description: All refresh tokens revoked for the authenticated user
  /users/me:
    get:
      tags: [Users]
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /groups:
    get:
      tags: [Groups]
      operationId: listGroups
      responses:
        '200':
          description: My groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudyGroupResponse'
    post:
      tags: [Groups]
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Created group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGroupResponse'
  /groups/{groupId}:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    get:
      tags: [Groups]
      operationId: getGroup
      responses:
        '200':
          description: Group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGroupResponse'
    patch:
      tags: [Groups]
      operationId: updateGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: Updated group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGroupResponse'
  /groups/{groupId}/join:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    post:
      tags: [Groups]
      operationId: joinGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinGroupRequest'
      responses:
        '200':
          description: Joined group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMemberResponse'
  /groups/{groupId}/members:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    get:
      tags: [Groups]
      operationId: listMembers
      responses:
        '200':
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupMemberResponse'
  /groups/{groupId}/start:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    post:
      tags: [Curriculum]
      operationId: startStudy
      responses:
        '201':
          description: Curriculum created from onboarding summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurriculumResponse'
  /groups/{groupId}/onboarding/me:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    get:
      tags: [Onboarding]
      operationId: getMyOnboarding
      responses:
        '200':
          description: My onboarding response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingResponse'
    put:
      tags: [Onboarding]
      operationId: saveMyOnboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveOnboardingRequest'
      responses:
        '200':
          description: Saved onboarding response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingResponse'
  /groups/{groupId}/onboarding/me/submit:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    post:
      tags: [Onboarding]
      operationId: submitMyOnboarding
      responses:
        '200':
          description: Submitted onboarding response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingResponse'
  /groups/{groupId}/curriculum:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    get:
      tags: [Curriculum]
      operationId: getCurriculum
      responses:
        '200':
          description: Active curriculum
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurriculumResponse'
  /groups/{groupId}/weeks/current:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    get:
      tags: [WeeklyTodo]
      operationId: getCurrentWeek
      responses:
        '200':
          description: Current week
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurriculumWeekResponse'
  /weeks/{weekId}/tasks:
    parameters:
      - $ref: '#/components/parameters/WeekId'
    get:
      tags: [WeeklyTodo]
      operationId: listWeeklyTasks
      responses:
        '200':
          description: Weekly tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeeklyTaskResponse'
  /weeks/{weekId}/progress/me:
    parameters:
      - $ref: '#/components/parameters/WeekId'
    get:
      tags: [WeeklyTodo]
      operationId: getMyWeekProgress
      responses:
        '200':
          description: Week progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberWeekProgressResponse'
    put:
      tags: [WeeklyTodo]
      operationId: updateMyWeekProgress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWeekProgressRequest'
      responses:
        '200':
          description: Week progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberWeekProgressResponse'
  /tasks/{taskId}/completion/me:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [WeeklyTodo]
      operationId: completeTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCompletionRequest'
      responses:
        '200':
          description: Task completion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCompletionResponse'
  /weeks/{weekId}/retrospectives/me:
    parameters:
      - $ref: '#/components/parameters/WeekId'
    post:
      tags: [Retrospectives]
      operationId: requestRetrospective
      responses:
        '202':
          description: Retrospective requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrospectiveResponse'
    get:
      tags: [Retrospectives]
      operationId: getMyRetrospective
      responses:
        '200':
          description: Retrospective
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrospectiveResponse'
  /groups/{groupId}/ai-conversations:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    post:
      tags: [AI]
      operationId: openAiConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenConversationRequest'
      responses:
        '201':
          description: Conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiConversationResponse'
  /ai-conversations/{conversationId}/messages:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    post:
      tags: [AI]
      operationId: sendAiConversationMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '201':
          description: Conversation message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiConversationMessageResponse'
  /users/me/notifications:
    get:
      tags: [Notifications]
      operationId: listMyNotifications
      parameters:
        - name: unreadOnly
          in: query
          required: false
          schema: {type: boolean}
        - name: cursor
          in: query
          required: false
          schema: {type: string}
      responses:
        '200':
          description: My in-app notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationResponse'
  /notifications/{notificationId}/read:
    parameters:
      - $ref: '#/components/parameters/NotificationId'
    post:
      tags: [Notifications]
      operationId: markNotificationRead
      responses:
        '200':
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
  /users/me/notifications/read-all:
    post:
      tags: [Notifications]
      operationId: markAllMyNotificationsRead
      responses:
        '204':
          description: All my notifications marked read
  /groups/{groupId}/notifications:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    get:
      tags: [Notifications]
      operationId: listGroupNotifications
      responses:
        '200':
          description: Notification logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationResponse'
  /groups/{groupId}/llm-usage:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    get:
      tags: [Operations]
      operationId: listLlmUsage
      responses:
        '200':
          description: LLM usage logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LlmUsageResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAccessToken:
      type: apiKey
      in: cookie
      name: studypot_access_token
    cookieRefreshToken:
      type: apiKey
      in: cookie
      name: studypot_refresh_token
  parameters:
    GroupId:
      name: groupId
      in: path
      required: true
      schema: {type: string, format: uuid}
    WeekId:
      name: weekId
      in: path
      required: true
      schema: {type: string, format: uuid}
    TaskId:
      name: taskId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema: {type: string, format: uuid}
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema: {type: string, format: uuid}
  schemas:
    StudyGroupStatus:
      type: string
      enum: [DRAFT, ONBOARDING, ACTIVE, COMPLETED, ARCHIVED]
    GroupMemberStatus:
      type: string
      enum: [PENDING_ONBOARDING, ACTIVE, LEFT]
    TaskCompletionStatus:
      type: string
      enum: [TODO, DONE, INCOMPLETE, SKIPPED]
    RetrospectiveStatus:
      type: string
      enum: [PENDING, PROCESSING, COMPLETED, FAILED]
    GoogleOAuthLoginRequest:
      type: object
      required: [authorizationCode, redirectUri]
      properties:
        authorizationCode: {type: string, minLength: 1}
        redirectUri: {type: string, format: uri}
        codeVerifier: {type: string}
    RefreshTokenRequest:
      type: object
      properties:
        refreshToken: {type: string, minLength: 1}
    LogoutRequest:
      type: object
      properties:
        refreshToken: {type: string, minLength: 1}
    AuthTokenResponse:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresIn, user]
      properties:
        accessToken: {type: string}
        refreshToken: {type: string}
        tokenType: {type: string, enum: [Bearer]}
        expiresIn: {type: integer, minimum: 1}
        user:
          $ref: '#/components/schemas/UserResponse'
    UserResponse:
      type: object
      required: [id, email, nickname]
      properties:
        id: {type: string, format: uuid}
        email: {type: string, format: email}
        nickname: {type: string}
    CreateGroupRequest:
      type: object
      required: [name, topic, detailKeywords, maxMembers, startsAt, endsAt]
      properties:
        name: {type: string, minLength: 1, maxLength: 120}
        topic: {type: string, minLength: 1, maxLength: 120}
        detailKeywords:
          type: array
          minItems: 1
          items: {type: string}
        maxMembers: {type: integer, minimum: 1}
        startsAt: {type: string, format: date}
        endsAt: {type: string, format: date}
        description: {type: string}
    UpdateGroupRequest:
      type: object
      properties:
        name: {type: string}
        description: {type: string}
        maxMembers: {type: integer, minimum: 1}
        isPublic: {type: boolean}
    JoinGroupRequest:
      type: object
      required: [inviteCode]
      properties:
        inviteCode: {type: string}
    StudyGroupResponse:
      type: object
      required: [id, name, topic, detailKeywords, status, maxMembers, inviteCode]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        topic: {type: string}
        detailKeywords:
          type: array
          items: {type: string}
        status:
          $ref: '#/components/schemas/StudyGroupStatus'
        maxMembers: {type: integer}
        inviteCode: {type: string}
        startsAt: {type: string, format: date}
        endsAt: {type: string, format: date}
    GroupMemberResponse:
      type: object
      required: [id, groupId, userId, permission, status]
      properties:
        id: {type: string, format: uuid}
        groupId: {type: string, format: uuid}
        userId: {type: string, format: uuid}
        permission: {type: string, enum: [OWNER, MEMBER]}
        status:
          $ref: '#/components/schemas/GroupMemberStatus'
        displayName: {type: string}
    AvailabilitySlot:
      type: object
      required: [dayOfWeek, startTime, endTime, timezone]
      properties:
        dayOfWeek: {type: integer, minimum: 0, maximum: 6}
        startTime: {type: string, pattern: '^\\d{2}:\\d{2}$'}
        endTime: {type: string, pattern: '^\\d{2}:\\d{2}$'}
        timezone: {type: string}
    SaveOnboardingRequest:
      type: object
      required: [keywordSkillLevels, taskPreferences, availabilitySlots]
      properties:
        keywordSkillLevels:
          type: object
          additionalProperties: {type: integer, minimum: 1, maximum: 5}
        taskPreferences:
          type: object
          additionalProperties: {type: integer, minimum: 1, maximum: 5}
        additionalNote: {type: string}
        availabilitySlots:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilitySlot'
    OnboardingResponse:
      type: object
      required: [id, groupId, memberId, status]
      properties:
        id: {type: string, format: uuid}
        groupId: {type: string, format: uuid}
        memberId: {type: string, format: uuid}
        keywordSkillLevels: {type: object}
        taskPreferences: {type: object}
        additionalNote: {type: string}
        availabilitySlots:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilitySlot'
        status: {type: string, enum: [DRAFT, SUBMITTED]}
        submittedAt: {type: string, format: date-time}
    CurriculumResponse:
      type: object
      required: [id, groupId, title, totalWeeks, status]
      properties:
        id: {type: string, format: uuid}
        groupId: {type: string, format: uuid}
        title: {type: string}
        totalWeeks: {type: integer}
        onboardingSummary: {type: object}
        status: {type: string, enum: [DRAFT, ACTIVE, COMPLETED]}
    CurriculumWeekResponse:
      type: object
      required: [id, curriculumId, weekNumber, title, status]
      properties:
        id: {type: string, format: uuid}
        curriculumId: {type: string, format: uuid}
        weekNumber: {type: integer}
        title: {type: string}
        sprintGoal: {type: string}
        status: {type: string, enum: [PENDING, IN_PROGRESS, COMPLETED]}
        startsAt: {type: string, format: date-time}
        endsAt: {type: string, format: date-time}
    WeeklyTaskResponse:
      type: object
      required: [id, curriculumWeekId, displayOrder, taskType, title, required]
      properties:
        id: {type: string, format: uuid}
        curriculumWeekId: {type: string, format: uuid}
        displayOrder: {type: integer}
        taskType: {type: string, enum: [READING, PRACTICE, ASSIGNMENT, PROJECT, CUSTOM]}
        title: {type: string}
        description: {type: string}
        required: {type: boolean}
        dueAt: {type: string, format: date-time}
    UpdateWeekProgressRequest:
      type: object
      properties:
        status: {type: string, enum: [NOT_STARTED, IN_PROGRESS, COMPLETED, INCOMPLETE, FEEDBACK_READY]}
        completionNote: {type: string}
        incompleteReason: {type: string}
    MemberWeekProgressResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        status: {type: string}
        completedAt: {type: string, format: date-time}
        incompleteReason: {type: string}
    TaskCompletionRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/TaskCompletionStatus'
        completionNote: {type: string}
        incompleteReason: {type: string}
        evidenceUrl: {type: string}
    TaskCompletionResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        status:
          $ref: '#/components/schemas/TaskCompletionStatus'
        completedAt: {type: string, format: date-time}
        incompleteReason: {type: string}
    RetrospectiveResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        status:
          $ref: '#/components/schemas/RetrospectiveStatus'
        aiFeedback: {type: object}
        nextWeekAdjustment: {type: object}
    OpenConversationRequest:
      type: object
      required: [conversationType]
      properties:
        conversationType: {type: string, enum: [TEAM_LEAD_CHAT, RETROSPECTIVE]}
        weekId: {type: string, format: uuid}
        retrospectiveId: {type: string, format: uuid}
    CreateMessageRequest:
      type: object
      required: [content]
      properties:
        content: {type: string, minLength: 1}
    AiConversationResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        conversationType: {type: string}
        status: {type: string, enum: [OPEN, CLOSED]}
        summary: {type: string}
    AiConversationMessageResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        senderType: {type: string, enum: [USER, ASSISTANT, SYSTEM]}
        content: {type: string}
        createdAt: {type: string, format: date-time}
    NotificationResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        notificationType: {type: string}
        channel: {type: string, enum: [IN_APP]}
        title: {type: string}
        body: {type: string}
        status: {type: string, enum: [PENDING, DELIVERED, READ, FAILED, SKIPPED]}
        scheduledAt: {type: string, format: date-time}
        deliveredAt: {type: string, format: date-time}
        readAt: {type: string, format: date-time}
    LlmUsageResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        purpose: {type: string}
        provider: {type: string}
        model: {type: string}
        inputTokens: {type: integer}
        outputTokens: {type: integer}
        status: {type: string, enum: [SUCCESS, FAILED, TIMEOUT]}
