<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StudyPot · LLM 사용 기록</title>
<style>
  :root {
    --green: #19C37D;
    --ink: #1a1d1f;
    --muted: #6b7280;
    --line: #e5e7eb;
    --bg: #f7f8fa;
    --card: #ffffff;
    --danger: #e5484d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", Roboto, sans-serif;
    font-size: 14px; line-height: 1.5;
  }
  header {
    background: var(--card); border-bottom: 1px solid var(--line);
    padding: 16px 24px; display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 17px; margin: 0; }
  header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); }
  header .who { margin-left: auto; color: var(--muted); font-size: 13px; }
  main { padding: 24px; max-width: 1280px; margin: 0 auto; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .card .label { color: var(--muted); font-size: 12px; }
  .card .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .card .value.green { color: var(--green); }
  .card .value.danger { color: var(--danger); }

  .filters {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 16px;
  }
  .filters .field { display: flex; flex-direction: column; gap: 4px; }
  .filters label { font-size: 12px; color: var(--muted); }
  .filters input, .filters select {
    border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; font-size: 13px; background: #fff;
    min-width: 130px;
  }
  button {
    background: var(--green); color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  button.ghost { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  button:disabled { opacity: .6; cursor: default; }

  table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); white-space: nowrap; font-variant-numeric: tabular-nums; }
  th { background: #fafbfc; color: var(--muted); font-weight: 600; font-size: 12px; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: #f4fbf8; }
  td.num { text-align: right; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .badge.ok { background: #e7f8f1; color: #0f8f5f; }
  .badge.fail { background: #fdecec; color: var(--danger); }
  .muted { color: var(--muted); }

  #message { padding: 40px; text-align: center; color: var(--muted); }
  #message a { color: var(--green); }
  .tokenbar { display: none; gap: 8px; align-items: center; margin-top: 12px; }
  .tokenbar input { flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); align-items: center; justify-content: center; padding: 24px; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; max-width: 720px; width: 100%; max-height: 85vh; overflow: auto; padding: 20px 24px; }
  .modal h3 { margin: 0 0 12px; }
  .modal pre { background: #0f1115; color: #d6e3ff; padding: 14px; border-radius: 10px; overflow: auto; font-size: 12px; }
  .modal .kv { display: grid; grid-template-columns: 120px 1fr; gap: 6px 12px; margin-bottom: 14px; }
  .modal .kv .k { color: var(--muted); }
  .modal .close { float: right; }
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>LLM 사용 기록</h1>
  <span class="who" id="who"></span>
</header>

<main>
  <div id="message">불러오는 중…</div>

  <div id="content" style="display:none">
    <div class="cards" id="cards"></div>

    <div class="filters">
      <div class="field">
        <label>목적</label>
        <select id="f-purpose"><option value="">전체</option></select>
      </div>
      <div class="field">
        <label>상태</label>
        <select id="f-status"><option value="">전체</option></select>
      </div>
      <div class="field">
        <label>그룹 ID</label>
        <input id="f-group" placeholder="UUID (선택)" />
      </div>
      <div class="field">
        <label>사용자 ID</label>
        <input id="f-user" placeholder="UUID (선택)" />
      </div>
      <div class="field">
        <label>시작</label>
        <input id="f-from" type="datetime-local" />
      </div>
      <div class="field">
        <label>종료</label>
        <input id="f-to" type="datetime-local" />
      </div>
      <div class="field">
        <label>최대 건수</label>
        <input id="f-limit" type="number" value="200" min="1" max="1000" />
      </div>
      <button id="apply">조회</button>
      <button class="ghost" id="reset">초기화</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>시각(KST)</th><th>그룹</th><th>사용자</th><th>목적</th><th>모델</th>
          <th>상태</th><th class="num">입력</th><th class="num">출력</th><th class="num">비용($)</th><th class="num">지연(ms)</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <p class="muted" id="count" style="margin-top:10px"></p>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="ghost close" id="modal-close">닫기</button>
    <h3>호출 상세</h3>
    <div class="kv" id="modal-kv"></div>
    <h4>요청 페이로드(민감정보 마스킹됨)</h4>
    <pre id="modal-payload"></pre>
    <h4>응답 요약</h4>
    <pre id="modal-summary"></pre>
  </div>
</div>

<script>
const PURPOSES = ["DETAIL_KEYWORD_SUGGEST","STUDY_RECOMMENDATION","CURRICULUM_GENERATE","CURRICULUM_REGENERATE_WEEK","TEAM_LEAD_CHAT","RETROSPECTIVE_ANALYZE","RETROSPECTIVE_FEEDBACK","NEXT_WEEK_ADJUST","WEEKLY_REPORT"];
const PURPOSE_LABELS = {
  DETAIL_KEYWORD_SUGGEST:"키워드 추천", STUDY_RECOMMENDATION:"다음 스터디 추천",
  CURRICULUM_GENERATE:"커리큘럼 생성", CURRICULUM_REGENERATE_WEEK:"커리큘럼 주차 재생성",
  TEAM_LEAD_CHAT:"AI 팀장 채팅", RETROSPECTIVE_ANALYZE:"회고 분석",
  RETROSPECTIVE_FEEDBACK:"회고 피드백", NEXT_WEEK_ADJUST:"다음 주차 조정", WEEKLY_REPORT:"주간 리포트"
};
const STATUSES = ["SUCCESS","FAILED","TIMEOUT"];

const TOKEN_KEY = "studypot_admin_token";
function token() { return localStorage.getItem(TOKEN_KEY) || ""; }

function authHeaders() {
  const h = {};
  const t = token();
  if (t) h["Authorization"] = "Bearer " + t;
  return h;
}

async function api(path) {
  const res = await fetch(path, { headers: authHeaders(), credentials: "include" });
  return res;
}

const $ = (id) => document.getElementById(id);
function esc(s) { return (s ?? "").toString().replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function shortId(u) { return u ? u.slice(0, 8) : "—"; }
function fmtTime(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleString("ko-KR", { timeZone: "Asia/Seoul", year:"2-digit", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });
}
function toIsoOrNull(localValue) { return localValue ? new Date(localValue).toISOString() : null; }

let lastItems = [];

function showMessage(html) {
  $("message").style.display = "block";
  $("message").innerHTML = html;
  $("content").style.display = "none";
}

function showLoginPrompt() {
  showMessage(
    '로그인이 필요합니다. 앱에서 발급받은 <b>액세스 토큰</b>을 입력해 주세요.' +
    '<div class="tokenbar" style="display:flex; max-width:560px; margin:16px auto 0">' +
    '<input id="token-input" placeholder="Bearer 토큰 붙여넣기" />' +
    '<button id="token-save">저장</button></div>'
  );
  $("token-save").onclick = () => {
    const v = $("token-input").value.trim();
    if (v) { localStorage.setItem(TOKEN_KEY, v); boot(); }
  };
}

function initFilterOptions() {
  const ps = $("f-purpose");
  PURPOSES.forEach(p => { const o = document.createElement("option"); o.value = p; o.textContent = PURPOSE_LABELS[p] || p; ps.appendChild(o); });
  const ss = $("f-status");
  STATUSES.forEach(s => { const o = document.createElement("option"); o.value = s; o.textContent = s; ss.appendChild(o); });
}

function buildQuery() {
  const params = new URLSearchParams();
  const g = $("f-group").value.trim(); if (g) params.set("groupId", g);
  const u = $("f-user").value.trim(); if (u) params.set("userId", u);
  if ($("f-purpose").value) params.set("purpose", $("f-purpose").value);
  if ($("f-status").value) params.set("status", $("f-status").value);
  const from = toIsoOrNull($("f-from").value); if (from) params.set("from", from);
  const to = toIsoOrNull($("f-to").value); if (to) params.set("to", to);
  const limit = $("f-limit").value; if (limit) params.set("limit", limit);
  return params.toString();
}

function renderCards(s) {
  const rate = s.totalCalls > 0 ? Math.round((s.successCalls / s.totalCalls) * 1000) / 10 : 0;
  const cost = s.totalCostUsd != null ? Number(s.totalCostUsd) : 0;
  const cards = [
    ["총 호출", s.totalCalls.toLocaleString(), ""],
    ["성공", s.successCalls.toLocaleString() + " (" + rate + "%)", "green"],
    ["실패", s.failedCalls.toLocaleString(), s.failedCalls > 0 ? "danger" : ""],
    ["입력 토큰", s.inputTokens.toLocaleString(), ""],
    ["출력 토큰", s.outputTokens.toLocaleString(), ""],
    ["총 비용", "$" + cost.toFixed(4), ""],
  ];
  $("cards").innerHTML = cards.map(([l, v, c]) =>
    `<div class="card"><div class="label">${l}</div><div class="value ${c}">${v}</div></div>`).join("");
}

function renderRows(items) {
  lastItems = items;
  $("rows").innerHTML = items.map((r, i) => {
    const ok = r.status === "SUCCESS";
    const badge = ok ? '<span class="badge ok">SUCCESS</span>' : `<span class="badge fail">${esc(r.status)}</span>`;
    const cost = r.totalCostUsd != null ? Number(r.totalCostUsd).toFixed(5) : "—";
    return `<tr data-i="${i}">
      <td>${fmtTime(r.createdAt)}</td>
      <td title="${esc(r.groupId||"")}">${esc(r.groupName || (r.groupId ? shortId(r.groupId) : "—"))}</td>
      <td title="${esc(r.userEmail||r.userId||"")}">${esc(r.userNickname || (r.userId ? shortId(r.userId) : "시스템"))}</td>
      <td>${esc(PURPOSE_LABELS[r.purpose] || r.purpose)}</td>
      <td class="muted">${esc(r.model)}</td>
      <td>${badge}</td>
      <td class="num">${(r.inputTokens||0).toLocaleString()}</td>
      <td class="num">${(r.outputTokens||0).toLocaleString()}</td>
      <td class="num">${cost}</td>
      <td class="num">${r.latencyMs != null ? r.latencyMs.toLocaleString() : "—"}</td>
    </tr>`;
  }).join("");
  $("count").textContent = `${items.length}건 표시 (최신순, 최대 ${$("f-limit").value}건)`;
  document.querySelectorAll("#rows tr").forEach(tr => tr.onclick = () => openModal(lastItems[+tr.dataset.i]));
}

function prettyJson(raw) {
  if (!raw) return "—";
  try { return JSON.stringify(JSON.parse(raw), null, 2); } catch { return raw; }
}

function openModal(r) {
  $("modal-kv").innerHTML = [
    ["기록 ID", r.id], ["시각", fmtTime(r.createdAt)],
    ["그룹", (r.groupName || "—") + (r.groupId ? ` (${r.groupId})` : "")],
    ["사용자", (r.userNickname || "시스템") + (r.userEmail ? ` · ${r.userEmail}` : "") + (r.userId ? ` (${r.userId})` : "")],
    ["목적", PURPOSE_LABELS[r.purpose] || r.purpose], ["제공자/모델", `${r.provider} · ${r.model}`],
    ["상태", r.status + (r.errorCode ? ` · ${r.errorCode}` : "")],
    ["토큰", `입력 ${r.inputTokens} / 출력 ${r.outputTokens}`],
    ["비용/지연", `$${r.totalCostUsd != null ? Number(r.totalCostUsd).toFixed(6) : "—"} · ${r.latencyMs != null ? r.latencyMs + "ms" : "—"}`],
  ].map(([k, v]) => `<div class="k">${esc(k)}</div><div>${esc(v)}</div>`).join("");
  $("modal-payload").textContent = prettyJson(r.requestPayload);
  $("modal-summary").textContent = r.responseSummary || "—";
  $("overlay").classList.add("open");
}
$("modal-close").onclick = () => $("overlay").classList.remove("open");
$("overlay").onclick = (e) => { if (e.target.id === "overlay") $("overlay").classList.remove("open"); };

async function load() {
  $("apply").disabled = true;
  try {
    const res = await api("/api/v1/admin/llm-usage?" + buildQuery());
    if (res.status === 401) { showLoginPrompt(); return; }
    if (res.status === 403) { showMessage("이 계정에는 운영자 권한이 없습니다."); return; }
    if (!res.ok) { showMessage("조회 실패: HTTP " + res.status); return; }
    const data = await res.json();
    renderCards(data.summary);
    renderRows(data.items);
    $("message").style.display = "none";
    $("content").style.display = "block";
  } catch (e) {
    showMessage("네트워크 오류: " + esc(e.message));
  } finally {
    $("apply").disabled = false;
  }
}

async function boot() {
  showMessage("불러오는 중…");
  let me;
  try {
    const res = await api("/api/v1/admin/me");
    if (res.status === 401) { showLoginPrompt(); return; }
    if (!res.ok) { showMessage("확인 실패: HTTP " + res.status); return; }
    me = await res.json();
  } catch (e) {
    showMessage("네트워크 오류: " + esc(e.message)); return;
  }
  if (!me.admin) { showMessage(`이 계정(${esc(me.email || "알 수 없음")})에는 운영자 권한이 없습니다.`); return; }
  $("who").textContent = me.email || "";
  await load();
}

initFilterOptions();
$("apply").onclick = load;
$("reset").onclick = () => {
  ["f-group","f-user","f-from","f-to"].forEach(id => $(id).value = "");
  $("f-purpose").value = ""; $("f-status").value = ""; $("f-limit").value = "200";
  load();
};
boot();
</script>
</body>
</html>
