<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StudyPot · 사용자 요금제 관리</title>
<style>
  :root {
    --green: #19C37D;
    --green-deep: #14a567;
    --ink: #1a1d1f;
    --muted: #6b7280;
    --line: #e5e7eb;
    --bg: #f7f8fa;
    --card: #ffffff;
    --danger: #e5484d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", Roboto, sans-serif;
    font-size: 14px; line-height: 1.5;
  }
  header {
    background: var(--card); border-bottom: 1px solid var(--line);
    padding: 16px 24px; display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 17px; margin: 0; }
  header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); }
  header .who { margin-left: auto; color: var(--muted); font-size: 13px; }
  header a { color: var(--muted); font-size: 13px; text-decoration: none; }
  header a:hover { color: var(--ink); }
  main { padding: 24px; max-width: 760px; margin: 0 auto; }

  .searchbar {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; display: flex; gap: 10px; align-items: flex-end; margin-bottom: 16px;
  }
  .searchbar .field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .searchbar label { font-size: 12px; color: var(--muted); }
  .searchbar input {
    border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; font-size: 14px; background: #fff; width: 100%;
  }
  button {
    background: var(--green); color: #fff; border: none; border-radius: 8px;
    padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: var(--green-deep); }
  button.ghost { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  button:disabled { opacity: .5; cursor: default; }

  .usercard { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; }
  .usercard .kv { display: grid; grid-template-columns: 90px 1fr; gap: 8px 14px; margin-bottom: 16px; }
  .usercard .kv .k { color: var(--muted); }
  .usercard .kv .v { font-variant-numeric: tabular-nums; word-break: break-all; }
  .badge { display: inline-block; padding: 3px 12px; border-radius: 999px; font-size: 13px; font-weight: 700; }
  .badge.free { background: #eef1f4; color: var(--muted); }
  .badge.premium { background: #e7f8f1; color: #0f8f5f; }
  .muted { color: var(--muted); font-size: 12px; }
  .actions { display: flex; gap: 10px; margin-top: 4px; }

  #message { padding: 40px; text-align: center; color: var(--muted); }
  #message a { color: var(--green); }
  .tokenbar { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
  .tokenbar input { flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }
  .toast { margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; font-weight: 600; display: none; }
  .toast.ok { background: #e7f8f1; color: #0f8f5f; display: block; }
  .toast.err { background: #fdecec; color: var(--danger); display: block; }
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>사용자 요금제 관리</h1>
  <a href="/admin/llm-usage.html">LLM 사용 기록 →</a>
  <span class="who" id="who"></span>
</header>

<main>
  <div id="message">불러오는 중…</div>

  <div id="content" style="display:none">
    <div class="toast" id="toast"></div>
    <div class="searchbar">
      <div class="field">
        <label>이메일로 사용자 조회</label>
        <input id="email" placeholder="member@studypot.dev" autocomplete="off" />
      </div>
      <button id="search">조회</button>
    </div>
    <div id="result"></div>
  </div>
</main>

<script>
const TOKEN_KEY = "studypot_admin_token";
function token() { return localStorage.getItem(TOKEN_KEY) || ""; }

function authHeaders(extra) {
  const h = Object.assign({}, extra || {});
  const t = token();
  if (t) h["Authorization"] = "Bearer " + t;
  return h;
}

async function api(path, opts) {
  const o = opts || {};
  const headers = authHeaders(o.body ? { "Content-Type": "application/json" } : {});
  return fetch(path, { method: o.method || "GET", headers, credentials: "include", body: o.body ? JSON.stringify(o.body) : undefined });
}

const $ = (id) => document.getElementById(id);
function esc(s) { return (s ?? "").toString().replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
function shortId(u) { return u ? u.slice(0, 8) : "—"; }

function showMessage(html) {
  $("message").style.display = "block";
  $("message").innerHTML = html;
  $("content").style.display = "none";
}
function showContent() {
  $("message").style.display = "none";
  $("content").style.display = "block";
}
function toast(msg, ok) {
  const el = $("toast");
  el.className = "toast " + (ok ? "ok" : "err");
  el.textContent = msg;
  setTimeout(() => { el.className = "toast"; }, 4000);
}

function showLoginPrompt() {
  showMessage(
    '로그인이 필요합니다. 앱에서 발급받은 <b>액세스 토큰</b>을 입력해 주세요.' +
    '<div class="tokenbar" style="max-width:560px; margin:16px auto 0">' +
    '<input id="token-input" placeholder="Bearer 토큰 붙여넣기" />' +
    '<button id="token-save">저장</button></div>'
  );
  $("token-save").onclick = () => {
    const v = $("token-input").value.trim();
    if (v) { localStorage.setItem(TOKEN_KEY, v); boot(); }
  };
}

let current = null;

function renderUser(u) {
  current = u;
  const isPremium = (u.plan || "").toUpperCase() === "PREMIUM";
  $("result").innerHTML =
    '<div class="usercard">' +
      '<div class="kv">' +
        '<div class="k">이메일</div><div class="v">' + esc(u.email) + '</div>' +
        '<div class="k">닉네임</div><div class="v">' + esc(u.nickname) + '</div>' +
        '<div class="k">사용자 ID</div><div class="v" title="' + esc(u.id) + '">' + esc(shortId(u.id)) + '… <span class="muted">(' + esc(u.id) + ')</span></div>' +
        '<div class="k">현재 요금제</div><div class="v"><span class="badge ' + (isPremium ? "premium" : "free") + '">' + esc(u.plan) + '</span></div>' +
      '</div>' +
      '<div class="actions">' +
        '<button id="to-free" class="ghost"' + (isPremium ? "" : " disabled") + '>FREE로 변경</button>' +
        '<button id="to-premium"' + (isPremium ? " disabled" : "") + '>PREMIUM으로 변경</button>' +
      '</div>' +
    '</div>';
  $("to-free").onclick = () => changePlan("FREE");
  $("to-premium").onclick = () => changePlan("PREMIUM");
}

async function search() {
  const email = $("email").value.trim();
  if (!email) { toast("이메일을 입력해 주세요.", false); return; }
  $("search").disabled = true;
  $("result").innerHTML = "";
  try {
    const res = await api("/api/v1/admin/users?email=" + encodeURIComponent(email));
    if (res.status === 401) { showLoginPrompt(); return; }
    if (res.status === 404) { toast("해당 이메일의 사용자를 찾을 수 없어요.", false); return; }
    if (!res.ok) { toast("조회 실패: HTTP " + res.status, false); return; }
    renderUser(await res.json());
  } catch (e) {
    toast("네트워크 오류: " + e.message, false);
  } finally {
    $("search").disabled = false;
  }
}

async function changePlan(plan) {
  if (!current) return;
  if (!confirm(`${current.email} 님의 요금제를 ${plan}(으)로 변경할까요?`)) return;
  $("to-free").disabled = true; $("to-premium").disabled = true;
  try {
    const res = await api("/api/v1/admin/users/" + encodeURIComponent(current.id) + "/plan", { method: "PATCH", body: { plan } });
    if (res.status === 401) { showLoginPrompt(); return; }
    if (!res.ok) { toast("변경 실패: HTTP " + res.status, false); renderUser(current); return; }
    renderUser(await res.json());
    toast("요금제를 " + plan + "(으)로 변경했어요.", true);
  } catch (e) {
    toast("네트워크 오류: " + e.message, false);
    renderUser(current);
  }
}

async function boot() {
  showMessage("불러오는 중…");
  let me;
  try {
    const res = await api("/api/v1/admin/me");
    if (res.status === 401) { showLoginPrompt(); return; }
    if (!res.ok) { showMessage("확인 실패: HTTP " + res.status); return; }
    me = await res.json();
  } catch (e) {
    showMessage("네트워크 오류: " + esc(e.message)); return;
  }
  if (!me.admin) { showMessage(`이 계정(${esc(me.email || "알 수 없음")})에는 운영자 권한이 없습니다.`); return; }
  $("who").textContent = me.email || "";
  showContent();
}

$("search").onclick = search;
$("email").addEventListener("keydown", (e) => { if (e.key === "Enter") search(); });
boot();
</script>
</body>
</html>
