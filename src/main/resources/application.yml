spring:
  application:
    name: ai-study-leader
  threads:
    virtual:
      enabled: true
  flyway:
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

studypot:
  auth:
    jwt:
      secret: ${STUDYPOT_AUTH_JWT_SECRET:}
      issuer: ${STUDYPOT_AUTH_JWT_ISSUER:https://api.studypot.example}
      access-token-ttl: ${STUDYPOT_AUTH_JWT_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${STUDYPOT_AUTH_REFRESH_TOKEN_TTL:30d}
  oauth:
    google:
      client-id: ${STUDYPOT_GOOGLE_CLIENT_ID:}
      client-secret: ${STUDYPOT_GOOGLE_CLIENT_SECRET:}
      token-uri: ${STUDYPOT_GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
      userinfo-uri: ${STUDYPOT_GOOGLE_USERINFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
