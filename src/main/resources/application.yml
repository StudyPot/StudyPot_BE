spring:
  application:
    name: ai-study-leader
  lifecycle:
    timeout-per-shutdown-phase: 20s
  threads:
    virtual:
      enabled: true
  datasource:
    hikari:
      pool-name: studypot-hikari
      maximum-pool-size: ${STUDYPOT_DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${STUDYPOT_DATASOURCE_MIN_IDLE:2}
      connection-timeout: ${STUDYPOT_DATASOURCE_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${STUDYPOT_DATASOURCE_VALIDATION_TIMEOUT:5000}
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false
    connect-retries: ${STUDYPOT_FLYWAY_CONNECT_RETRIES:3}
  data:
    redis:
      host: ${STUDYPOT_REDIS_HOST:localhost}
      port: ${STUDYPOT_REDIS_PORT:6379}
  rabbitmq:
    host: ${STUDYPOT_RABBITMQ_HOST:localhost}
    port: ${STUDYPOT_RABBITMQ_PORT:5672}
    username: ${STUDYPOT_RABBITMQ_USERNAME:guest}
    password: ${STUDYPOT_RABBITMQ_PASSWORD:guest}

springdoc:
  packages-to-scan: com.studypot.aistudyleader
  paths-to-match: /api/v1/**
  api-docs:
    enabled: ${STUDYPOT_OPENAPI_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${STUDYPOT_SWAGGER_UI_ENABLED:false}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    persist-authorization: true
    with-credentials: true
    csrf:
      enabled: true
      cookie-name: XSRF-TOKEN
      header-name: X-XSRF-TOKEN
    doc-expansion: none

management:
  health:
    redis:
      enabled: ${STUDYPOT_REDIS_HEALTH_ENABLED:false}
    rabbit:
      enabled: ${STUDYPOT_RABBITMQ_HEALTH_ENABLED:false}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: ${STUDYPOT_LOG_LEVEL_ROOT:INFO}
    com.studypot.aistudyleader: ${STUDYPOT_LOG_LEVEL_APP:INFO}
    org.flywaydb.core: ${STUDYPOT_LOG_LEVEL_FLYWAY:INFO}
    org.springframework.jdbc.core: ${STUDYPOT_LOG_LEVEL_JDBC:INFO}
    org.springframework.security: ${STUDYPOT_LOG_LEVEL_SECURITY:INFO}
  pattern:
    level: "%5p [%X{traceId:-},%X{spanId:-}]"

studypot:
  openapi:
    public-docs-enabled: ${STUDYPOT_OPENAPI_PUBLIC_DOCS_ENABLED:false}
  ai:
    openai:
      api-key: ${STUDYPOT_AI_OPENAI_API_KEY:}
      base-url: ${STUDYPOT_AI_OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${STUDYPOT_AI_OPENAI_MODEL:gpt-4o-mini}
      api-mode: ${STUDYPOT_AI_OPENAI_API_MODE:responses}
      connect-timeout: ${STUDYPOT_AI_OPENAI_CONNECT_TIMEOUT:5s}
      read-timeout: ${STUDYPOT_AI_OPENAI_READ_TIMEOUT:30s}
  rate-limit:
    enabled: ${STUDYPOT_RATE_LIMIT_ENABLED:false}
    fail-closed: ${STUDYPOT_RATE_LIMIT_FAIL_CLOSED:true}
    users-me:
      limit: ${STUDYPOT_RATE_LIMIT_USERS_ME_LIMIT:60}
      window: ${STUDYPOT_RATE_LIMIT_USERS_ME_WINDOW:PT60S}
    ai-conversation:
      limit: ${STUDYPOT_RATE_LIMIT_AI_CONVERSATION_LIMIT:5}
      window: ${STUDYPOT_RATE_LIMIT_AI_CONVERSATION_WINDOW:PT60S}
    curriculum-generation:
      limit: ${STUDYPOT_RATE_LIMIT_CURRICULUM_GENERATION_LIMIT:3}
      window: ${STUDYPOT_RATE_LIMIT_CURRICULUM_GENERATION_WINDOW:PT10M}
    retrospective-feedback:
      limit: ${STUDYPOT_RATE_LIMIT_RETROSPECTIVE_FEEDBACK_LIMIT:2}
      window: ${STUDYPOT_RATE_LIMIT_RETROSPECTIVE_FEEDBACK_WINDOW:PT24H}
  notification:
    rabbitmq:
      enabled: ${STUDYPOT_NOTIFICATION_RABBITMQ_ENABLED:false}
      exchange: ${STUDYPOT_NOTIFICATION_RABBITMQ_EXCHANGE:studypot.notification.events}
      queue: ${STUDYPOT_NOTIFICATION_RABBITMQ_QUEUE:studypot.notification.events}
      routing-key: ${STUDYPOT_NOTIFICATION_RABBITMQ_ROUTING_KEY:notification.create}
  cors:
    allowed-origins: ${STUDYPOT_CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${STUDYPOT_CORS_ALLOWED_ORIGIN_PATTERNS:}
    allowed-methods: ${STUDYPOT_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD}
    allowed-headers: ${STUDYPOT_CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin,X-Requested-With,X-XSRF-TOKEN,X-CSRF-TOKEN}
    exposed-headers: ${STUDYPOT_CORS_EXPOSED_HEADERS:Location}
    allow-credentials: ${STUDYPOT_CORS_ALLOW_CREDENTIALS:false}
  auth:
    jwt:
      secret: ${STUDYPOT_AUTH_JWT_SECRET}
      issuer: ${STUDYPOT_AUTH_JWT_ISSUER}
      access-token-ttl: ${STUDYPOT_AUTH_JWT_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${STUDYPOT_AUTH_REFRESH_TOKEN_TTL:30d}
    cookie:
      access-token-name: ${STUDYPOT_AUTH_ACCESS_TOKEN_COOKIE:studypot_access_token}
      refresh-token-name: ${STUDYPOT_AUTH_REFRESH_TOKEN_COOKIE:studypot_refresh_token}
      domain: ${STUDYPOT_AUTH_COOKIE_DOMAIN:}
      path: ${STUDYPOT_AUTH_COOKIE_PATH:/}
      secure: ${STUDYPOT_AUTH_COOKIE_SECURE:true}
      same-site: ${STUDYPOT_AUTH_COOKIE_SAME_SITE:Lax}
    oauth2:
      backend-callback-uri: ${STUDYPOT_AUTH_OAUTH2_BACKEND_CALLBACK_URI:}
      frontend-success-uri: ${STUDYPOT_AUTH_OAUTH2_FRONTEND_SUCCESS_URI}
      frontend-failure-uri: ${STUDYPOT_AUTH_OAUTH2_FRONTEND_FAILURE_URI}
  oauth:
    google:
      token-uri: ${STUDYPOT_GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
      userinfo-uri: ${STUDYPOT_GOOGLE_USERINFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
      authorization-uri: ${STUDYPOT_GOOGLE_AUTHORIZATION_URI:https://accounts.google.com/o/oauth2/v2/auth}
      scopes: ${STUDYPOT_GOOGLE_SCOPES:openid,email,profile}
      connect-timeout: ${STUDYPOT_GOOGLE_CONNECT_TIMEOUT:5s}
      read-timeout: ${STUDYPOT_GOOGLE_READ_TIMEOUT:10s}
