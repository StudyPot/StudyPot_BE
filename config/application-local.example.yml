server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/studypot?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8&connectionTimeZone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:replace-with-local-db-password}
    hikari:
      maximum-pool-size: ${STUDYPOT_DATASOURCE_MAX_POOL_SIZE:5}
      minimum-idle: ${STUDYPOT_DATASOURCE_MIN_IDLE:1}
      initialization-fail-timeout: ${STUDYPOT_DATASOURCE_INITIALIZATION_FAIL_TIMEOUT:1}
  flyway:
    clean-disabled: true
    connect-retries: ${STUDYPOT_FLYWAY_CONNECT_RETRIES:5}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,flyway

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    try-it-out-enabled: true
    persist-authorization: true
    display-request-duration: true

logging:
  level:
    root: INFO
    com.studypot.aistudyleader: DEBUG
    org.flywaydb.core: INFO
    org.springframework.jdbc.core: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO

studypot:
  openapi:
    public-docs-enabled: true
  cors:
    allowed-origins: ${STUDYPOT_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://localhost:3000}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
    allowed-headers: Authorization,Content-Type,Accept,Origin,X-Requested-With,X-XSRF-TOKEN,X-CSRF-TOKEN
    exposed-headers: Location
    allow-credentials: true
  auth:
    jwt:
      secret: ${STUDYPOT_AUTH_JWT_SECRET:replace-with-at-least-32-character-local-secret}
      issuer: ${STUDYPOT_AUTH_JWT_ISSUER:http://localhost:8080}
      access-token-ttl: ${STUDYPOT_AUTH_JWT_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${STUDYPOT_AUTH_REFRESH_TOKEN_TTL:30d}
    cookie:
      access-token-name: studypot_access_token
      refresh-token-name: studypot_refresh_token
      path: /
      secure: ${STUDYPOT_AUTH_COOKIE_SECURE:false}
      same-site: Lax
    oauth2:
      backend-callback-uri: ${STUDYPOT_AUTH_OAUTH2_BACKEND_CALLBACK_URI:http://localhost:8080/api/login/oauth2/code/google}
      frontend-success-uri: ${STUDYPOT_AUTH_OAUTH2_FRONTEND_SUCCESS_URI:http://localhost:3000/auth/success}
      frontend-failure-uri: ${STUDYPOT_AUTH_OAUTH2_FRONTEND_FAILURE_URI:http://localhost:3000/auth/failure}
  oauth:
    google:
      client-id: ${STUDYPOT_GOOGLE_CLIENT_ID:replace-with-google-client-id}
      client-secret: ${STUDYPOT_GOOGLE_CLIENT_SECRET:replace-with-google-client-secret}
      authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
      token-uri: https://oauth2.googleapis.com/token
      userinfo-uri: https://openidconnect.googleapis.com/v1/userinfo
      scopes: openid,email,profile
      connect-timeout: 5s
      read-timeout: 10s
