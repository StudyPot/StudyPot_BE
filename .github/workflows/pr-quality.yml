name: PR Quality

on:
  pull_request:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  harness-tests:
    name: harness-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run harness tests
        run: bash scripts/tests/run.sh

  shellcheck-reviewdog:
    name: shellcheck-reviewdog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck with reviewdog
        uses: reviewdog/action-shellcheck@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: file
          fail_level: error
          path: .
          pattern: "*.sh"
          check_all_files_with_shebangs: "true"

  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint with reviewdog
        uses: reviewdog/action-actionlint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: file
          fail_level: error

  openapi-parse:
    name: openapi-parse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse OpenAPI YAML
        run: |
          ruby -e 'require "yaml"; doc = YAML.load_file("docs/specs/openapi.yaml"); abort("openapi must be 3.1.x") unless doc.fetch("openapi").to_s.start_with?("3.1."); abort("info.title is required") unless doc.dig("info", "title"); abort("paths is required") unless doc["paths"].is_a?(Hash); puts "OpenAPI parsed"'

  db-schema-coverage:
    name: db-schema-coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify ERD v0.8 schema coverage
        run: bash scripts/tests/test_quality_gate_contracts.sh

  backend-check:
    name: backend-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backend check when scaffold exists
        run: |
          if [[ -x ./gradlew ]]; then
            ./gradlew check build --no-daemon
          elif compgen -G "build.gradle*" >/dev/null || compgen -G "settings.gradle*" >/dev/null; then
            echo "Gradle project exists but ./gradlew is missing or not executable."
            exit 1
          else
            echo "No Spring/Gradle scaffold yet; backend check is skipped for docs-only harness state."
          fi

  review-gate-pass:
    name: review-gate-pass
    runs-on: ubuntu-latest
    needs:
      - harness-tests
      - shellcheck-reviewdog
      - workflow-lint
      - openapi-parse
      - db-schema-coverage
      - backend-check
    if: ${{ always() }}
    steps:
      - name: Verify prerequisite jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          bad = {name: data["result"] for name, data in needs.items() if data["result"] not in {"success", "skipped"}}
          if bad:
              print(f"review gate cannot pass: {bad}", file=sys.stderr)
              sys.exit(1)
          print("review gate prerequisites passed")
          PY

      - name: Checkout
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v4

      - name: Verify company role review gates
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/task/verify-role-review-gates.sh "${{ github.event.pull_request.number }}" "${{ github.event.pull_request.head.sha }}"

      - name: Post review gate marker
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v9
        with:
          script: |
            const pull = context.payload.pull_request;
            const head = pull.head.sha;
            const marker = `GitHub Actions Review Gate: PASS\nHead: ${head}`;
            const body = `${marker}\nWorkflow: ${context.workflow}\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pull.number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user?.type === "Bot" &&
              comment.body?.includes("GitHub Actions Review Gate: PASS")
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pull.number,
                body,
              });
            }
