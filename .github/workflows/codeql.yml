name: CodeQL

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql-scan:
    name: codeql-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect JVM sources
        id: detect
        run: |
          if [[ -d src ]] && find src -type f \( -name '*.java' -o -name '*.kt' \) -print -quit | grep -q .; then
            echo "has_jvm_sources=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_jvm_sources=false" >> "${GITHUB_OUTPUT}"
            echo "No Java/Kotlin source files yet; CodeQL is skipped until the backend scaffold has source code."
          fi

      - name: Initialize CodeQL
        if: ${{ steps.detect.outputs.has_jvm_sources == 'true' }}
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: none

      - name: Perform CodeQL analysis
        if: ${{ steps.detect.outputs.has_jvm_sources == 'true' }}
        uses: github/codeql-action/analyze@v3

