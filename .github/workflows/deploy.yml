name: Deploy

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: studypot-deploy-develop
  cancel-in-progress: false

jobs:
  deploy:
    name: build-push-deploy
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run backend verification
        run: ./gradlew check build --no-daemon

      - name: Resolve image metadata
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/studypot-api"
          {
            echo "name=${image}"
            echo "tag=${image}:${GITHUB_SHA}"
            echo "latest=${image}:latest"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push deploy image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.latest }}

      - name: Configure SSH
        env:
          STUDYPOT_DEPLOY_HOST: ${{ secrets.STUDYPOT_DEPLOY_HOST }}
          STUDYPOT_DEPLOY_KNOWN_HOSTS: ${{ secrets.STUDYPOT_DEPLOY_KNOWN_HOSTS }}
          STUDYPOT_DEPLOY_SSH_KEY: ${{ secrets.STUDYPOT_DEPLOY_SSH_KEY }}
        run: |
          test -n "${STUDYPOT_DEPLOY_HOST}"
          test -n "${STUDYPOT_DEPLOY_SSH_KEY}"
          test -n "${STUDYPOT_DEPLOY_KNOWN_HOSTS}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${STUDYPOT_DEPLOY_SSH_KEY}" > "${HOME}/.ssh/studypot_deploy"
          chmod 600 "${HOME}/.ssh/studypot_deploy"
          printf '%s\n' "${STUDYPOT_DEPLOY_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"

      - name: Upload deploy artifacts
        env:
          STUDYPOT_DEPLOY_HOST: ${{ secrets.STUDYPOT_DEPLOY_HOST }}
          STUDYPOT_DEPLOY_USER: ${{ secrets.STUDYPOT_DEPLOY_USER }}
          STUDYPOT_DEPLOY_DIR: ${{ secrets.STUDYPOT_DEPLOY_DIR }}
          STUDYPOT_DEPLOY_COMPOSE_FILE: ${{ secrets.STUDYPOT_DEPLOY_COMPOSE_FILE }}
        run: |
          deploy_user="${STUDYPOT_DEPLOY_USER:-opc}"
          deploy_dir="${STUDYPOT_DEPLOY_DIR:-/opt/studypot}"
          deploy_compose_file="${STUDYPOT_DEPLOY_COMPOSE_FILE:-deploy/docker-compose.prod.yml}"
          case "${deploy_compose_file}" in
            /*|*..*) echo "Invalid STUDYPOT_DEPLOY_COMPOSE_FILE: ${deploy_compose_file}" >&2; exit 1 ;;
          esac
          test -f "${deploy_compose_file}"
          ssh -i "${HOME}/.ssh/studypot_deploy" "${deploy_user}@${STUDYPOT_DEPLOY_HOST}" "mkdir -p '${deploy_dir}'"
          scp -i "${HOME}/.ssh/studypot_deploy" "${deploy_compose_file}" "${deploy_user}@${STUDYPOT_DEPLOY_HOST}:${deploy_dir}/docker-compose.yml"

      - name: Upload runtime AI env
        env:
          STUDYPOT_DEPLOY_HOST: ${{ secrets.STUDYPOT_DEPLOY_HOST }}
          STUDYPOT_DEPLOY_USER: ${{ secrets.STUDYPOT_DEPLOY_USER }}
          STUDYPOT_DEPLOY_DIR: ${{ secrets.STUDYPOT_DEPLOY_DIR }}
          STUDYPOT_AI_OPENAI_API_KEY: ${{ secrets.STUDYPOT_AI_OPENAI_API_KEY }}
          STUDYPOT_AI_OPENAI_BASE_URL: ${{ secrets.STUDYPOT_AI_OPENAI_BASE_URL }}
          STUDYPOT_AI_OPENAI_MODEL: ${{ secrets.STUDYPOT_AI_OPENAI_MODEL }}
          STUDYPOT_AI_OPENAI_API_MODE: ${{ secrets.STUDYPOT_AI_OPENAI_API_MODE }}
          STUDYPOT_AI_OPENAI_CONNECT_TIMEOUT: ${{ secrets.STUDYPOT_AI_OPENAI_CONNECT_TIMEOUT }}
          STUDYPOT_AI_OPENAI_READ_TIMEOUT: ${{ secrets.STUDYPOT_AI_OPENAI_READ_TIMEOUT }}
          STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_DETAIL_KEYWORD_SUGGEST: ${{ secrets.STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_DETAIL_KEYWORD_SUGGEST }}
          STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_CURRICULUM_GENERATE: ${{ secrets.STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_CURRICULUM_GENERATE }}
          STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_RETROSPECTIVE_FEEDBACK: ${{ secrets.STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_RETROSPECTIVE_FEEDBACK }}
          STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_TEAM_LEAD_CHAT: ${{ secrets.STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_TEAM_LEAD_CHAT }}
        run: |
          deploy_user="${STUDYPOT_DEPLOY_USER:-opc}"
          deploy_dir="${STUDYPOT_DEPLOY_DIR:-/opt/studypot}"
          runtime_env="$(mktemp)"
          trap 'rm -f "${runtime_env}"' EXIT
          {
            printf 'STUDYPOT_AI_OPENAI_API_KEY=%s\n' "${STUDYPOT_AI_OPENAI_API_KEY:-}"
            printf 'STUDYPOT_AI_OPENAI_BASE_URL=%s\n' "${STUDYPOT_AI_OPENAI_BASE_URL:-https://api.openai.com/v1}"
            printf 'STUDYPOT_AI_OPENAI_MODEL=%s\n' "${STUDYPOT_AI_OPENAI_MODEL:-gpt-4o-mini}"
            printf 'STUDYPOT_AI_OPENAI_API_MODE=%s\n' "${STUDYPOT_AI_OPENAI_API_MODE:-responses}"
            printf 'STUDYPOT_AI_OPENAI_CONNECT_TIMEOUT=%s\n' "${STUDYPOT_AI_OPENAI_CONNECT_TIMEOUT:-5s}"
            printf 'STUDYPOT_AI_OPENAI_READ_TIMEOUT=%s\n' "${STUDYPOT_AI_OPENAI_READ_TIMEOUT:-120s}"
            printf 'STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_DETAIL_KEYWORD_SUGGEST=%s\n' "${STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_DETAIL_KEYWORD_SUGGEST:-256}"
            printf 'STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_CURRICULUM_GENERATE=%s\n' "${STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_CURRICULUM_GENERATE:-4096}"
            printf 'STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_RETROSPECTIVE_FEEDBACK=%s\n' "${STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_RETROSPECTIVE_FEEDBACK:-2048}"
            printf 'STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_TEAM_LEAD_CHAT=%s\n' "${STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_TEAM_LEAD_CHAT:-1536}"
          } > "${runtime_env}"
          chmod 600 "${runtime_env}"
          scp -i "${HOME}/.ssh/studypot_deploy" "${runtime_env}" "${deploy_user}@${STUDYPOT_DEPLOY_HOST}:${deploy_dir}/.runtime.env"

      - name: Login to GHCR on oracle-was
        env:
          STUDYPOT_DEPLOY_HOST: ${{ secrets.STUDYPOT_DEPLOY_HOST }}
          STUDYPOT_DEPLOY_USER: ${{ secrets.STUDYPOT_DEPLOY_USER }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deploy_user="${STUDYPOT_DEPLOY_USER:-opc}"
          printf -v ghcr_username_q '%q' "${GHCR_USERNAME}"
          printf '%s' "${GHCR_TOKEN}" | ssh -i "${HOME}/.ssh/studypot_deploy" "${deploy_user}@${STUDYPOT_DEPLOY_HOST}" \
            "sudo docker login ghcr.io -u ${ghcr_username_q} --password-stdin"

      - name: Deploy on oracle-was
        env:
          STUDYPOT_DEPLOY_HOST: ${{ secrets.STUDYPOT_DEPLOY_HOST }}
          STUDYPOT_DEPLOY_USER: ${{ secrets.STUDYPOT_DEPLOY_USER }}
          STUDYPOT_DEPLOY_DIR: ${{ secrets.STUDYPOT_DEPLOY_DIR }}
          STUDYPOT_IMAGE: ${{ steps.image.outputs.tag }}
        run: |
          deploy_user="${STUDYPOT_DEPLOY_USER:-opc}"
          deploy_dir="${STUDYPOT_DEPLOY_DIR:-/opt/studypot}"
          printf -v deploy_dir_q '%q' "${deploy_dir}"
          printf -v studypot_image_q '%q' "${STUDYPOT_IMAGE}"
          ssh -i "${HOME}/.ssh/studypot_deploy" "${deploy_user}@${STUDYPOT_DEPLOY_HOST}" \
            "STUDYPOT_DEPLOY_DIR=${deploy_dir_q} STUDYPOT_IMAGE=${studypot_image_q} bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${STUDYPOT_DEPLOY_DIR}"
          test -f .env

          previous_image=""
          if [ -f .image.env ]; then
            previous_image="$(sed -n 's/^STUDYPOT_IMAGE=//p' .image.env | tail -n 1)"
          fi
          if [ -n "${previous_image}" ]; then
            printf 'STUDYPOT_PREVIOUS_IMAGE=%s\n' "${previous_image}" > .previous-image.env
          fi

          printf 'STUDYPOT_IMAGE=%s\n' "${STUDYPOT_IMAGE}" > .image.env
          test -f .runtime.env || touch .runtime.env
          sudo docker compose --env-file .env --env-file .image.env --env-file .runtime.env -f docker-compose.yml pull studypot-api
          sudo docker compose --env-file .env --env-file .image.env --env-file .runtime.env -f docker-compose.yml up -d --force-recreate studypot-api
          sudo docker image prune -f
          REMOTE

      - name: Verify deployed health
        env:
          STUDYPOT_DEPLOY_HOST: ${{ secrets.STUDYPOT_DEPLOY_HOST }}
          STUDYPOT_DEPLOY_USER: ${{ secrets.STUDYPOT_DEPLOY_USER }}
          STUDYPOT_DEPLOY_DIR: ${{ secrets.STUDYPOT_DEPLOY_DIR }}
        run: |
          deploy_user="${STUDYPOT_DEPLOY_USER:-opc}"
          deploy_dir="${STUDYPOT_DEPLOY_DIR:-/opt/studypot}"
          printf -v deploy_dir_q '%q' "${deploy_dir}"
          ssh -i "${HOME}/.ssh/studypot_deploy" "${deploy_user}@${STUDYPOT_DEPLOY_HOST}" \
            "STUDYPOT_DEPLOY_DIR=${deploy_dir_q} bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${STUDYPOT_DEPLOY_DIR}"

          for attempt in {1..24}; do
            test -f .runtime.env || touch .runtime.env
            sudo docker compose --env-file .env --env-file .image.env --env-file .runtime.env -f docker-compose.yml ps
            if curl -fsS http://127.0.0.1:8080/actuator/health; then
              exit 0
            fi

            status="$(sudo docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' studypot-api 2>/dev/null || true)"
            echo "Waiting for studypot-api health (${attempt}/24). container_status=${status:-unknown}"
            if [ "${status}" = "unhealthy" ]; then
              sudo docker logs --tail=160 studypot-api || true
              exit 1
            fi
            sleep 5
          done

          sudo docker compose --env-file .env --env-file .image.env --env-file .runtime.env -f docker-compose.yml ps
          sudo docker logs --tail=160 studypot-api || true
          exit 1
          REMOTE
