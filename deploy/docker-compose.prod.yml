services:
  studypot-api:
    image: "${STUDYPOT_IMAGE:?STUDYPOT_IMAGE is required}"
    platform: "${STUDYPOT_API_PLATFORM:-linux/amd64}"
    container_name: studypot-api
    restart: unless-stopped
    mem_limit: "${STUDYPOT_API_MEMORY_LIMIT:-512m}"
    ports:
      - "${STUDYPOT_HTTP_BIND:-127.0.0.1}:${STUDYPOT_HTTP_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}"
      SPRING_DATASOURCE_USERNAME: "${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}"
      STUDYPOT_DATASOURCE_MAX_POOL_SIZE: "${STUDYPOT_DATASOURCE_MAX_POOL_SIZE:-3}"
      STUDYPOT_DATASOURCE_MIN_IDLE: "${STUDYPOT_DATASOURCE_MIN_IDLE:-1}"
      STUDYPOT_FLYWAY_CONNECT_RETRIES: "${STUDYPOT_FLYWAY_CONNECT_RETRIES:-10}"
      STUDYPOT_OPENAPI_ENABLED: "${STUDYPOT_OPENAPI_ENABLED:-false}"
      STUDYPOT_SWAGGER_UI_ENABLED: "${STUDYPOT_SWAGGER_UI_ENABLED:-false}"
      STUDYPOT_OPENAPI_PUBLIC_DOCS_ENABLED: "${STUDYPOT_OPENAPI_PUBLIC_DOCS_ENABLED:-false}"
      STUDYPOT_LOG_LEVEL_ROOT: "${STUDYPOT_LOG_LEVEL_ROOT:-INFO}"
      STUDYPOT_LOG_LEVEL_APP: "${STUDYPOT_LOG_LEVEL_APP:-INFO}"
      STUDYPOT_LOG_LEVEL_FLYWAY: "${STUDYPOT_LOG_LEVEL_FLYWAY:-INFO}"
      STUDYPOT_LOG_LEVEL_JDBC: "${STUDYPOT_LOG_LEVEL_JDBC:-INFO}"
      STUDYPOT_LOG_LEVEL_SECURITY: "${STUDYPOT_LOG_LEVEL_SECURITY:-INFO}"
      STUDYPOT_CORS_ALLOWED_ORIGINS: "${STUDYPOT_CORS_ALLOWED_ORIGINS:-}"
      STUDYPOT_CORS_ALLOWED_ORIGIN_PATTERNS: "${STUDYPOT_CORS_ALLOWED_ORIGIN_PATTERNS:-}"
      STUDYPOT_CORS_ALLOW_CREDENTIALS: "${STUDYPOT_CORS_ALLOW_CREDENTIALS:-false}"
      STUDYPOT_AUTH_JWT_SECRET: "${STUDYPOT_AUTH_JWT_SECRET:?STUDYPOT_AUTH_JWT_SECRET is required}"
      STUDYPOT_AUTH_JWT_ISSUER: "${STUDYPOT_AUTH_JWT_ISSUER:?STUDYPOT_AUTH_JWT_ISSUER is required}"
      STUDYPOT_AUTH_JWT_ACCESS_TOKEN_TTL: "${STUDYPOT_AUTH_JWT_ACCESS_TOKEN_TTL:-15m}"
      STUDYPOT_AUTH_REFRESH_TOKEN_TTL: "${STUDYPOT_AUTH_REFRESH_TOKEN_TTL:-30d}"
      STUDYPOT_AUTH_COOKIE_DOMAIN: "${STUDYPOT_AUTH_COOKIE_DOMAIN:-}"
      STUDYPOT_AUTH_COOKIE_SECURE: "${STUDYPOT_AUTH_COOKIE_SECURE:-true}"
      STUDYPOT_AUTH_COOKIE_SAME_SITE: "${STUDYPOT_AUTH_COOKIE_SAME_SITE:-Lax}"
      STUDYPOT_AUTH_OAUTH2_BACKEND_CALLBACK_URI: "${STUDYPOT_AUTH_OAUTH2_BACKEND_CALLBACK_URI:-}"
      STUDYPOT_AUTH_OAUTH2_FRONTEND_SUCCESS_URI: "${STUDYPOT_AUTH_OAUTH2_FRONTEND_SUCCESS_URI:?STUDYPOT_AUTH_OAUTH2_FRONTEND_SUCCESS_URI is required}"
      STUDYPOT_AUTH_OAUTH2_FRONTEND_FAILURE_URI: "${STUDYPOT_AUTH_OAUTH2_FRONTEND_FAILURE_URI:?STUDYPOT_AUTH_OAUTH2_FRONTEND_FAILURE_URI is required}"
      STUDYPOT_GOOGLE_CLIENT_ID: "${STUDYPOT_GOOGLE_CLIENT_ID:-}"
      STUDYPOT_GOOGLE_CLIENT_SECRET: "${STUDYPOT_GOOGLE_CLIENT_SECRET:-}"
      STUDYPOT_GOOGLE_SCOPES: "${STUDYPOT_GOOGLE_SCOPES:-openid,email,profile}"
      STUDYPOT_ADMIN_EMAILS: "${STUDYPOT_ADMIN_EMAILS:-}"
      STUDYPOT_AI_OPENAI_API_KEY: "${STUDYPOT_AI_OPENAI_API_KEY:-}"
      STUDYPOT_AI_OPENAI_BASE_URL: "${STUDYPOT_AI_OPENAI_BASE_URL:-https://api.openai.com/v1}"
      STUDYPOT_AI_OPENAI_MODEL: "${STUDYPOT_AI_OPENAI_MODEL:-gpt-5-nano}"
      STUDYPOT_AI_OPENAI_MODEL_DETAIL_KEYWORD_SUGGEST: "${STUDYPOT_AI_OPENAI_MODEL_DETAIL_KEYWORD_SUGGEST:-}"
      STUDYPOT_AI_OPENAI_MODEL_CURRICULUM_GENERATE: "${STUDYPOT_AI_OPENAI_MODEL_CURRICULUM_GENERATE:-gpt-5-mini}"
      STUDYPOT_AI_OPENAI_MODEL_RETROSPECTIVE_FEEDBACK: "${STUDYPOT_AI_OPENAI_MODEL_RETROSPECTIVE_FEEDBACK:-}"
      STUDYPOT_AI_OPENAI_MODEL_TEAM_LEAD_CHAT: "${STUDYPOT_AI_OPENAI_MODEL_TEAM_LEAD_CHAT:-}"
      STUDYPOT_AI_OPENAI_API_MODE: "${STUDYPOT_AI_OPENAI_API_MODE:-responses}"
      STUDYPOT_AI_OPENAI_CONNECT_TIMEOUT: "${STUDYPOT_AI_OPENAI_CONNECT_TIMEOUT:-5s}"
      STUDYPOT_AI_OPENAI_READ_TIMEOUT: "${STUDYPOT_AI_OPENAI_READ_TIMEOUT:-120s}"
      STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_DETAIL_KEYWORD_SUGGEST: "${STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_DETAIL_KEYWORD_SUGGEST:-256}"
      STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_CURRICULUM_GENERATE: "${STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_CURRICULUM_GENERATE:-16384}"
      STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_RETROSPECTIVE_FEEDBACK: "${STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_RETROSPECTIVE_FEEDBACK:-2048}"
      STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_TEAM_LEAD_CHAT: "${STUDYPOT_AI_OPENAI_MAX_OUTPUT_TOKENS_TEAM_LEAD_CHAT:-1536}"
      STUDYPOT_AI_OPENAI_REASONING_EFFORT_DETAIL_KEYWORD_SUGGEST: "${STUDYPOT_AI_OPENAI_REASONING_EFFORT_DETAIL_KEYWORD_SUGGEST:-minimal}"
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--Xms128m -Xmx256m -XX:MaxMetaspaceSize=160m -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
