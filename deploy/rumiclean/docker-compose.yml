services:
  studypot-mysql:
    image: mysql:8.0
    container_name: studypot-mysql
    restart: unless-stopped
    mem_limit: "${STUDYPOT_MYSQL_MEMORY_LIMIT:-512m}"
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: "${STUDYPOT_MYSQL_DATABASE:-studypot}"
      MYSQL_USER: "${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}"
      MYSQL_PASSWORD: "${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}"
      MYSQL_ROOT_PASSWORD: "${STUDYPOT_MYSQL_ROOT_PASSWORD:?STUDYPOT_MYSQL_ROOT_PASSWORD is required}"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --max-connections=40
    volumes:
      - studypot_mysql_data:/var/lib/mysql
      - ./backups:/backups
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${STUDYPOT_MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  studypot-redis:
    image: redis:7-alpine
    container_name: studypot-redis
    restart: unless-stopped
    mem_limit: "${STUDYPOT_REDIS_MEMORY_LIMIT:-128m}"
    env_file:
      - .env
    command:
      - sh
      - -c
      - >-
        redis-server
        --requirepass "$${STUDYPOT_REDIS_PASSWORD:?STUDYPOT_REDIS_PASSWORD is required}"
        --appendonly no
        --save ""
        --maxmemory "$${STUDYPOT_REDIS_MAXMEMORY:-96mb}"
        --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${STUDYPOT_REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  studypot-rabbitmq:
    image: rabbitmq:4-management
    container_name: studypot-rabbitmq
    hostname: studypot-rabbitmq
    restart: unless-stopped
    mem_limit: "${STUDYPOT_RABBITMQ_MEMORY_LIMIT:-384m}"
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: "${STUDYPOT_RABBITMQ_USERNAME:?STUDYPOT_RABBITMQ_USERNAME is required}"
      RABBITMQ_DEFAULT_PASS: "${STUDYPOT_RABBITMQ_PASSWORD:?STUDYPOT_RABBITMQ_PASSWORD is required}"
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "${STUDYPOT_RABBITMQ_ERL_ARGS:-+S 1:1 +sbwt none +sbwtdcpu none +sbwtdio none}"
    volumes:
      - studypot_rabbitmq_data:/var/lib/rabbitmq
    expose:
      - "5672"
      - "15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  studypot-api:
    image: "${STUDYPOT_IMAGE:?STUDYPOT_IMAGE is required}"
    platform: "${STUDYPOT_API_PLATFORM:-linux/amd64}"
    container_name: studypot-api
    restart: unless-stopped
    mem_limit: "${STUDYPOT_API_MEMORY_LIMIT:-512m}"
    env_file:
      - .env
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: "jdbc:mysql://studypot-mysql:3306/${STUDYPOT_MYSQL_DATABASE:-studypot}?${STUDYPOT_MYSQL_JDBC_PARAMS:-useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8&connectionTimeZone=UTC}"
      SPRING_DATASOURCE_USERNAME: "${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}"
      STUDYPOT_DATASOURCE_MAX_POOL_SIZE: "${STUDYPOT_DATASOURCE_MAX_POOL_SIZE:-3}"
      STUDYPOT_DATASOURCE_MIN_IDLE: "${STUDYPOT_DATASOURCE_MIN_IDLE:-1}"
      STUDYPOT_FLYWAY_CONNECT_RETRIES: "${STUDYPOT_FLYWAY_CONNECT_RETRIES:-10}"
      STUDYPOT_OPENAPI_ENABLED: "${STUDYPOT_OPENAPI_ENABLED:-false}"
      STUDYPOT_SWAGGER_UI_ENABLED: "${STUDYPOT_SWAGGER_UI_ENABLED:-false}"
      STUDYPOT_OPENAPI_PUBLIC_DOCS_ENABLED: "${STUDYPOT_OPENAPI_PUBLIC_DOCS_ENABLED:-false}"
      STUDYPOT_LOG_LEVEL_ROOT: "${STUDYPOT_LOG_LEVEL_ROOT:-INFO}"
      STUDYPOT_LOG_LEVEL_APP: "${STUDYPOT_LOG_LEVEL_APP:-INFO}"
      STUDYPOT_LOG_LEVEL_FLYWAY: "${STUDYPOT_LOG_LEVEL_FLYWAY:-INFO}"
      STUDYPOT_LOG_LEVEL_JDBC: "${STUDYPOT_LOG_LEVEL_JDBC:-INFO}"
      STUDYPOT_LOG_LEVEL_SECURITY: "${STUDYPOT_LOG_LEVEL_SECURITY:-INFO}"
      STUDYPOT_CORS_ALLOWED_ORIGINS: "${STUDYPOT_CORS_ALLOWED_ORIGINS:-https://studypot.rumiclean.com}"
      STUDYPOT_CORS_ALLOWED_ORIGIN_PATTERNS: "${STUDYPOT_CORS_ALLOWED_ORIGIN_PATTERNS:-}"
      STUDYPOT_CORS_ALLOW_CREDENTIALS: "${STUDYPOT_CORS_ALLOW_CREDENTIALS:-true}"
      STUDYPOT_AUTH_JWT_SECRET: "${STUDYPOT_AUTH_JWT_SECRET:?STUDYPOT_AUTH_JWT_SECRET is required}"
      STUDYPOT_AUTH_JWT_ISSUER: "${STUDYPOT_AUTH_JWT_ISSUER:-https://studypot.rumiclean.com}"
      STUDYPOT_AUTH_JWT_ACCESS_TOKEN_TTL: "${STUDYPOT_AUTH_JWT_ACCESS_TOKEN_TTL:-15m}"
      STUDYPOT_AUTH_REFRESH_TOKEN_TTL: "${STUDYPOT_AUTH_REFRESH_TOKEN_TTL:-30d}"
      STUDYPOT_AUTH_COOKIE_DOMAIN: "${STUDYPOT_AUTH_COOKIE_DOMAIN:-studypot.rumiclean.com}"
      STUDYPOT_AUTH_COOKIE_SECURE: "${STUDYPOT_AUTH_COOKIE_SECURE:-true}"
      STUDYPOT_AUTH_COOKIE_SAME_SITE: "${STUDYPOT_AUTH_COOKIE_SAME_SITE:-Lax}"
      STUDYPOT_AUTH_OAUTH2_BACKEND_CALLBACK_URI: "${STUDYPOT_AUTH_OAUTH2_BACKEND_CALLBACK_URI:-https://studypot.rumiclean.com/api/login/oauth2/code/google}"
      STUDYPOT_AUTH_OAUTH2_FRONTEND_SUCCESS_URI: "${STUDYPOT_AUTH_OAUTH2_FRONTEND_SUCCESS_URI:?STUDYPOT_AUTH_OAUTH2_FRONTEND_SUCCESS_URI is required}"
      STUDYPOT_AUTH_OAUTH2_FRONTEND_FAILURE_URI: "${STUDYPOT_AUTH_OAUTH2_FRONTEND_FAILURE_URI:?STUDYPOT_AUTH_OAUTH2_FRONTEND_FAILURE_URI is required}"
      STUDYPOT_GOOGLE_CLIENT_ID: "${STUDYPOT_GOOGLE_CLIENT_ID:-}"
      STUDYPOT_GOOGLE_CLIENT_SECRET: "${STUDYPOT_GOOGLE_CLIENT_SECRET:-}"
      STUDYPOT_GOOGLE_SCOPES: "${STUDYPOT_GOOGLE_SCOPES:-openid,email,profile}"
      STUDYPOT_AI_OPENAI_API_KEY: "${STUDYPOT_AI_OPENAI_API_KEY:-}"
      STUDYPOT_AI_OPENAI_BASE_URL: "${STUDYPOT_AI_OPENAI_BASE_URL:-https://api.openai.com/v1}"
      STUDYPOT_AI_OPENAI_MODEL: "${STUDYPOT_AI_OPENAI_MODEL:-gpt-4o-mini}"
      STUDYPOT_AI_OPENAI_API_MODE: "${STUDYPOT_AI_OPENAI_API_MODE:-responses}"
      STUDYPOT_AI_OPENAI_CONNECT_TIMEOUT: "${STUDYPOT_AI_OPENAI_CONNECT_TIMEOUT:-5s}"
      STUDYPOT_AI_OPENAI_READ_TIMEOUT: "${STUDYPOT_AI_OPENAI_READ_TIMEOUT:-30s}"
      STUDYPOT_RATE_LIMIT_ENABLED: "${STUDYPOT_RATE_LIMIT_ENABLED:-true}"
      STUDYPOT_RATE_LIMIT_FAIL_CLOSED: "${STUDYPOT_RATE_LIMIT_FAIL_CLOSED:-true}"
      STUDYPOT_REDIS_HOST: studypot-redis
      STUDYPOT_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: "${STUDYPOT_REDIS_PASSWORD:?STUDYPOT_REDIS_PASSWORD is required}"
      STUDYPOT_REDIS_HEALTH_ENABLED: "${STUDYPOT_REDIS_HEALTH_ENABLED:-true}"
      STUDYPOT_NOTIFICATION_RABBITMQ_ENABLED: "${STUDYPOT_NOTIFICATION_RABBITMQ_ENABLED:-true}"
      STUDYPOT_RABBITMQ_HOST: studypot-rabbitmq
      STUDYPOT_RABBITMQ_PORT: "5672"
      STUDYPOT_RABBITMQ_USERNAME: "${STUDYPOT_RABBITMQ_USERNAME:?STUDYPOT_RABBITMQ_USERNAME is required}"
      STUDYPOT_RABBITMQ_PASSWORD: "${STUDYPOT_RABBITMQ_PASSWORD:?STUDYPOT_RABBITMQ_PASSWORD is required}"
      STUDYPOT_RABBITMQ_HEALTH_ENABLED: "${STUDYPOT_RABBITMQ_HEALTH_ENABLED:-true}"
      STUDYPOT_NOTIFICATION_RABBITMQ_EXCHANGE: "${STUDYPOT_NOTIFICATION_RABBITMQ_EXCHANGE:-studypot.notification.events}"
      STUDYPOT_NOTIFICATION_RABBITMQ_QUEUE: "${STUDYPOT_NOTIFICATION_RABBITMQ_QUEUE:-studypot.notification.events}"
      STUDYPOT_NOTIFICATION_RABBITMQ_ROUTING_KEY: "${STUDYPOT_NOTIFICATION_RABBITMQ_ROUTING_KEY:-notification.create}"
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--Xms128m -Xmx256m -XX:MaxMetaspaceSize=160m -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError}"
    ports:
      - "127.0.0.1:${STUDYPOT_HTTP_PORT:-8080}:8080"
    expose:
      - "8080"
    depends_on:
      studypot-mysql:
        condition: service_healthy
      studypot-redis:
        condition: service_healthy
      studypot-rabbitmq:
        condition: service_healthy
    networks:
      - default
      - caddy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 75s

networks:
  caddy:
    external: true
    name: compose-cleanb_default

volumes:
  studypot_mysql_data:
  studypot_rabbitmq_data:
